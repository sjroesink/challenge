<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💪 Push-Up Challenge</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Push-Ups">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>💪 Push-Up Challenge</h1>
      </div>
      <div class="header-right">
        <button id="notify-btn" class="btn-notify hidden" title="Notificaties inschakelen">🔔</button>
        <div id="user-badge" class="badge hidden"></div>
      </div>
    </header>

    <section id="checkin-section" class="checkin hidden">
      <div class="checkin-info">
        <div class="checkin-label" id="checkin-label"></div>
        <div class="checkin-day" id="checkin-day"></div>
      </div>
      <div class="checkin-action">
        <div class="sets-input-group">
          <span class="sets-label-text">Sets:</span>
          <input type="number" id="sets-input" min="1" value="1" />
        </div>
        <button id="checkin-btn" class="btn-checkin">✓ Gehaald!</button>
      </div>
      <div id="record-area" class="record-area hidden">
        <button id="record-btn" class="btn-record" type="button">🎙️ Opname starten</button>
        <div id="record-status" class="record-status hidden"></div>
      </div>
    </section>

    <section id="gimmick" class="gimmick hidden"></section>

    <section id="motion-view" class="motion-view hidden">
      <div class="motion-header">
        <div>
          <div class="motion-label" id="motion-label"></div>
          <div class="motion-title" id="motion-title"></div>
        </div>
        <button type="button" class="motion-close" id="motion-close-btn">✕ Sluiten</button>
      </div>
      <div id="motion-summary" class="motion-summary"></div>
      <div id="motion-status" class="motion-status"></div>
      <div id="motion-chart" class="motion-chart"></div>
    </section>

    <section id="progress-section">
      <table id="progress-table">
        <thead id="progress-head"></thead>
        <tbody id="progress-body"></tbody>
      </table>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
